services:
  database:
    image: postgres:17-alpine
    container_name: personal-finances-db
    environment:
      POSTGRES_DB: finances
      POSTGRES_USER: finances
      POSTGRES_PASSWORD: finances
    ports:
      - "5432:5432"
    volumes:
      - ~/.personal-finances-app/volumes/database:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finances"]
      interval: 5s
      timeout: 5s
      retries: 5

databaseChangeLog:
  - changeSet:
      id: 003-create-categories
      author: jlmonteiro
      changes:
        - createTable:
            tableName: categories
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: icon
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  defaultValueComputed: now()
                  constraints:
                    nullable: false

  - changeSet:
      id: 003-create-payees
      author: jlmonteiro
      changes:
        - createTable:
            tableName: payees
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: created_at
                  type: timestamp with time zone
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  defaultValueComputed: now()
                  constraints:
                    nullable: false

  - changeSet:
      id: 003-create-payee-categories
      author: jlmonteiro
      changes:
        - createTable:
            tableName: payee_categories
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: payee_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: category_id
                  type: uuid
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: payee_categories
            baseColumnNames: payee_id
            referencedTableName: payees
            referencedColumnNames: id
            constraintName: fk_payee_categories_payee
        - addForeignKeyConstraint:
            baseTableName: payee_categories
            baseColumnNames: category_id
            referencedTableName: categories
            referencedColumnNames: id
            constraintName: fk_payee_categories_category
        - addUniqueConstraint:
            tableName: payee_categories
            columnNames: payee_id, category_id
            constraintName: uq_payee_categories_payee_category

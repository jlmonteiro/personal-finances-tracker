databaseChangeLog:
  - changeSet:
      id: 001-create-app-configuration
      author: jlmonteiro
      changes:
        - createTable:
            tableName: app_configuration
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: currency
                  type: varchar(3)
                  constraints:
                    nullable: false
              - column:
                  name: month_start_day
                  type: int
                  defaultValueNumeric: 1
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - sql:
            sql: >
              ALTER TABLE app_configuration
              ADD CONSTRAINT chk_app_configuration_start_day
              CHECK (month_start_day BETWEEN 1 AND 28)
